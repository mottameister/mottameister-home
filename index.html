<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>@mottameister</title>

  <meta name="description" content="Hub oficial do @mottameister" />
  <meta name="theme-color" content="#b517ff" />

  <link rel="icon" type="image/png" href="./favicon.png" />

  <style>
    :root {
      --bg: #090711;
      --card: rgba(255, 255, 255, 0.075);
      --text: #f7f2ff;
      --muted: #b9a9cb;
      --purple: #b517ff;
      --pink: #ff4fd8;
      --blue: #43d9ff;
      --shadow: 0 24px 80px rgba(181, 23, 255, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(181,23,255,.3), transparent),
        linear-gradient(180deg, #07050d 0%, var(--bg) 100%);
    }

    .wrap {
      max-width: 720px;
      margin: auto;
      padding: 30px 16px;
    }

    .hero {
      text-align: center;
    }

    /* AVATAR FIX */
    .avatar-shell {
      width: 140px;
      height: 140px;
      margin: 0 auto 16px;
      border-radius: 999px;
      padding: 3px;
      background: linear-gradient(135deg, var(--purple), var(--blue));
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      overflow: hidden;
      border: 3px solid #090711;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      max-width: 400px;
      max-height: 400px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
    }

    .tagline {
      color: var(--muted);
      margin-top: 10px;
    }

    .panel {
      margin-top: 24px;
      padding: 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .links {
      display: grid;
      gap: 10px;
    }

    .link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      transition: .2s;
    }

    .link:hover {
      transform: translateY(-2px);
    }

    /* GLOW BUTTON */
    .link-main {
      position: relative;
      background: linear-gradient(135deg, rgba(181,23,255,.35), rgba(67,217,255,.15));
      border-color: rgba(181,23,255,.4);
      box-shadow:
        0 0 20px rgba(181,23,255,.4),
        0 0 40px rgba(67,217,255,.2);
    }

    .link-main::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--purple), var(--blue), var(--pink));
      z-index: -1;
      opacity: 0.4;
      filter: blur(12px);
    }

    .icon {
      font-size: 20px;
    }

    .title {
      font-weight: bold;
    }

    .desc {
      font-size: 13px;
      color: var(--muted);
    }

    .section-title {
      margin: 18px 4px 10px;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: .6;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="hero">
      <div class="avatar-shell">
        <div class="avatar">
          <img src="./profile.jepg" alt="@mottameister">
        </div>
      </div>

      <h1>@mottameister</h1>
      <p class="tagline">
        Gaming, comunidade e vida real 🚀
      </p>
    </section>

    <section class="panel">
      <div class="links">

        <a class="link link-main" href="https://discord.gg/SEU-LINK">
          <div>
            <div class="title">💬 Discord</div>
            <div class="desc">Comunidade e servidor</div>
          </div>
          →
        </a>

        <a class="link" href="#">
          <div>
            <div class="title">🧩 Modpack</div>
            <div class="desc">Cobblemon Motta 2025</div>
          </div>
          →
        </a>

        <a class="link" href="#">
          <div>
            <div class="title">🦉 Patreon</div>
            <div class="desc">Corujões e conteúdo exclusivo</div>
          </div>
          →
        </a>

      </div>

      <div class="section-title">CONTEÚDO</div>

      <div class="links">

        <a class="link" href="#">
          <div>
            <div class="title">▶️ YouTube</div>
            <div class="desc">Guias e campanhas</div>
          </div>
          →
        </a>

        <a class="link" href="#">
          <div>
            <div class="title">📸 Instagram</div>
            <div class="desc">Vida real</div>
          </div>
          →
        </a>

        <a class="link" href="#">
          <div>
            <div class="title">✂️ Cortes</div>
            <div class="desc">Dicas rápidas</div>
          </div>
          →
        </a>

      </div>

    </section>

    <footer class="footer">
      mottameister.xyz 🦉
    </footer>

  </main>
</body>
</html>
